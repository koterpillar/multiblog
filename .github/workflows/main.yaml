name: CI
on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo ./install-deps
      - name: Build and test
        uses: freckle/stack-action@v5
        with:
          stack-build-arguments: --fast --lock-file error-on-write
      - name: Build executable
        run: stack --no-terminal build --fast --copy-bins --local-bin-path .
      - name: Integration test
        run: |
          docker build -t multiblog-integration-test .
          ./test-integration.sh --docker multiblog-integration-test
      - name: Store executable
        uses: actions/upload-artifact@v7
        with:
          name: executable
          path: multiblog

  publish:
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Download executable
        uses: actions/download-artifact@v8
        with:
          name: executable
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REGISTRY_USER: ${{ github.actor }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx \
            --package @codedependant/semantic-release-docker@7 \
            --package semantic-release@25 \
            semantic-release
